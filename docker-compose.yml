version: '3.8'

services:
  # PostgreSQL database with extensions
  postgres:
    image: postgres:15-alpine
    container_name: integration-monitor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
      POSTGRES_DB: integration_monitor
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - integration-monitor-network

  # API Server (FastAPI + Uvicorn)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: integration-monitor-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres_dev_password@postgres:5432/integration_monitor
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./api:/app/api:ro
    command: >
      sh -c "sleep 5 &&
             python -m uvicorn api.app:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - integration-monitor-network

  # React Dashboard (Node.js)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: integration-monitor-dashboard
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./dashboard:/app/dashboard:ro
    networks:
      - integration-monitor-network

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: integration-monitor-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - integration-monitor-network

  # Redis for caching/sessions (optional, for future use)
  redis:
    image: redis:7-alpine
    container_name: integration-monitor-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - integration-monitor-network

volumes:
  postgres_data:
  redis_data:

networks:
  integration-monitor-network:
    driver: bridge
